name: Bump oci-research-system dependency

on:
  repository_dispatch:
    types: [oci-research-system-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update dependency to new commit
        env:
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.dependencies['@zacharymays-cpu/oci-research-system'] =
              'github:zacharymays-cpu/oci-research-system-content#' + process.env.SHA;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install and build (verification gate)
        run: |
          npm install
          npm run build

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump oci-research-system to ${{ github.event.client_payload.sha }}"
          title: "Bump oci-research-system to v${{ github.event.client_payload.version }}"
          body: |
            Automated dependency bump to `oci-research-system-content@${{ github.event.client_payload.sha }}` (v${{ github.event.client_payload.version }}).

            `npm install` + `npm run build` passed in this workflow run before this PR was opened.
          branch: "bump-oci-research-system-${{ github.event.client_payload.sha }}"
          base: main
          delete-branch: true
