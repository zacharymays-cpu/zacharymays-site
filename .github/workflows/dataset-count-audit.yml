# .github/workflows/dataset-count-audit.yml
#
# Dataset count consistency audit.
#
# Triggers:
#   - workflow_dispatch: fired by Supabase Edge Function on any DB row change
#   - push to main: catches hardcodes introduced in code commits
#   - daily schedule: safety net fallback at 08:00 UTC

name: Dataset Count Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'What triggered this run'
        required: false
        default: 'manual'
      trigger_table:
        description: 'DB table that changed (from Supabase webhook)'
        required: false
        default: ''
      trigger_event:
        description: 'DB event type: INSERT | UPDATE | DELETE'
        required: false
        default: ''
      trigger_record:
        description: 'Name of the org/anchor that changed'
        required: false
        default: ''

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log trigger context
        run: |
          echo "Trigger source : ${{ github.event.inputs.trigger_source || github.event_name }}"
          echo "Changed table  : ${{ github.event.inputs.trigger_table }}"
          echo "Event type     : ${{ github.event.inputs.trigger_event }}"
          echo "Record         : ${{ github.event.inputs.trigger_record }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch live dataset stats
        id: fetch_stats
        run: |
          SITE_URL="${{ vars.SITE_URL }}"
          SITE_URL="${SITE_URL%/}"  # Remove trailing slash if present
          STATS=$(curl -sf "$SITE_URL/api/dataset-stats")
          echo "stats=$STATS" >> $GITHUB_OUTPUT
          echo "Live stats: $STATS"

      - name: Run count consistency audit
        id: audit
        env:
          LIVE_STATS: ${{ steps.fetch_stats.outputs.stats }}
          TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || github.event_name }}
          TRIGGER_RECORD: ${{ github.event.inputs.trigger_record }}
        run: node .github/scripts/audit-counts.mjs

      - name: Open issue on drift detection (scheduled or webhook runs only)
        if: |
          failure() &&
          (github.event_name == 'schedule' ||
           github.event.inputs.trigger_source == 'supabase_webhook')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const report = fs.existsSync('/tmp/audit-report.md')
              ? fs.readFileSync('/tmp/audit-report.md', 'utf8')
              : 'Audit script failed — check workflow logs.'

            const triggerRecord = '${{ github.event.inputs.trigger_record }}'
            const triggerTable  = '${{ github.event.inputs.trigger_table }}'
            const titleSuffix   = triggerRecord
              ? ` after change to "${triggerRecord}" (${triggerTable})`
              : ` — ${new Date().toISOString().split('T')[0]}`

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Dataset count drift detected${titleSuffix}`,
              body: report,
              labels: ['dataset', 'automated']
            })
